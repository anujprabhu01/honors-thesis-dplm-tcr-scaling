# @package _global_

# TCR scaling experiment: ~15M parameters
# Usage: python train.py experiment=scaling/tcr_15m
# Architecture: hidden=384, layers=8, heads=8, intermediate=1536 (~14.6M params)
# head_dim=48, d/L=48 continues graceful width-dominant scaling trend

defaults:
  - /datamodule: tcr
  - /callbacks: lm
  - /trainer: ddp_bf16

project: "TCR_Scaling"
name: "tcr_15m"

datamodule:
  max_tokens: 4096 # Max total tokens per batch per GPU (controls dynamic batch size: ~240 seqs at avg 17 tokens)
  max_len: 64 # Truncation threshold (no effect: TCR max is 27 aa + 2 special = 29 tokens)
  num_workers: 4

model:
  _target_: dplm
  num_diffusion_timesteps: 500
  gradient_ckpt: false
  rdm_couple: false
  lora:
    enable: false
  net:
    arch_type: esm
    name: null
    hidden_size: 384
    num_hidden_layers: 8
    num_attention_heads: 8
    intermediate_size: 1536
    vocab_size: 33
    max_position_embeddings: 1026
    dropout: 0.1
    pretrain: false

task:
  _target_: lm/dplm
  learning:
    noise: random_mask
    watch_t1_t2_loss: false
    cal_constant_loss: false
    weight: linear
  criterion:
    _target_: byprot.modules.cross_entropy.RDMCrossEntropyLoss
    label_smoothing: 0.0
    ignore_index: 1
  optimizer:
    type: adamw
    _partial_: true
    lr: ${train.lr}
    betas:
      - 0.9
      - 0.98
    weight_decay: 0.01
  lr_scheduler:
    type: polynomial
    warmup_steps: 1000
    total_steps: ${trainer.max_steps}
    lr: ${train.lr}
    lr_end: 1e-6
    warmup_init_lr: 1e-07
    power: 1

train:
  seed: 42
  lr: 0.00003  # Scaled: LR ~ N^{-0.5}, 3e-4 * (111K/14.6M)^0.5 ~ 2.6e-5 -> 3e-5
  monitor: "val/loss"
  mode: "min"
  patience: 1000

trainer:
  min_epochs: 1
  max_epochs: 10000
  gradient_clip_val: 0.0
  num_sanity_val_steps: 0
  reload_dataloaders_every_n_epochs: 1
  use_distributed_sampler: false
  max_steps: 40000
  accumulate_grad_batches: 1
  check_val_every_n_epoch: null
  val_check_interval: 500
  enable_progress_bar: false
  num_nodes: 1
