# @package _global_

# TCR scaling experiment: ~5M parameters, 32M dataset
# Usage: python train.py experiment=scaling/tcr_5m_32m logger=wandb

defaults:
  - /datamodule: tcr_32m
  - /callbacks: lm
  - /trainer: ddp_bf16

project: "TCR_Scaling"
name: "tcr_5m_32m"

datamodule:
  max_tokens: 4096
  max_len: 64
  num_workers: 4

model:
  _target_: dplm
  num_diffusion_timesteps: 500
  gradient_ckpt: false
  rdm_couple: false
  lora:
    enable: false
  net:
    arch_type: esm
    name: null
    hidden_size: 256
    num_hidden_layers: 6
    num_attention_heads: 8
    intermediate_size: 1024
    vocab_size: 33
    max_position_embeddings: 1026
    dropout: 0.1
    pretrain: false

task:
  _target_: lm/dplm
  learning:
    noise: random_mask
    watch_t1_t2_loss: false
    cal_constant_loss: false
    weight: linear
  criterion:
    _target_: byprot.modules.cross_entropy.RDMCrossEntropyLoss
    label_smoothing: 0.0
    ignore_index: 1
  optimizer:
    type: adamw
    _partial_: true
    lr: ${train.lr}
    betas:
      - 0.9
      - 0.98
    weight_decay: 0.01
  lr_scheduler:
    type: polynomial
    warmup_steps: 1000
    total_steps: ${trainer.max_steps}
    lr: ${train.lr}
    lr_end: 1e-6
    warmup_init_lr: 1e-07
    power: 1

train:
  seed: 42
  lr: 0.00005
  monitor: "val/loss"
  mode: "min"
  patience: 1000

trainer:
  min_epochs: 1
  max_epochs: 10000
  gradient_clip_val: 0.0
  num_sanity_val_steps: 0
  reload_dataloaders_every_n_epochs: 1
  use_distributed_sampler: false
  max_steps: 40000
  accumulate_grad_batches: 1
  check_val_every_n_epoch: null
  val_check_interval: 500
  enable_progress_bar: false
  num_nodes: 1
